# Render Blueprint — one web service + one managed Postgres.
# New + → Blueprint → connect this repo → Render provisions both and wires DATABASE_URL.
services:
  - type: web
    name: solace
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: GROQ_API_KEY
        sync: false            # paste your primary key in the Render dashboard
      - key: GROQ_API_KEY_FALLBACK
        sync: false            # optional fallback key (rate-limit/5xx failover)
      - key: GROQ_MODEL_SMALL
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_LARGE
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret
      - key: ACCESS_TTL_MIN
        value: "15"
      - key: REFRESH_TTL_DAYS
        value: "7"
      - key: ALLOW_OPEN_REGISTRATION
        value: "true"
      - key: NCBI_EMAIL
        sync: false            # put any contact email
      - key: CORS_ORIGINS
        value: "*"
      - key: PUBMED_RETMAX
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: solace-db
          property: connectionString

databases:
  - name: solace-db
    plan: free
